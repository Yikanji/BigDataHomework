services:
  influxdb:
    image: influxdb:2.7
    container_name: tsdb-influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: test-org
      DOCKER_INFLUXDB_INIT_BUCKET: test-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token-for-testing
    restart: unless-stopped

  iotdb:
    image: apache/iotdb:1.3.2-standalone
    container_name: tsdb-iotdb
    ports:
      - "6667:6667"
      - "18080:18080"
    volumes:
      - ./data/iotdb:/iotdb/data
    environment:
      enable_rest_service: "true"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: tsdb-mysql
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: droid
    restart: unless-stopped
